name: API Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite a ejecutar"
        required: false
        default: "All"
        type: choice
        options:
          - All
          - Smoke
          - Regression
          - Contract
          - Security
          - Negative
          - Idempotencia
          - Performance
          - SOAP

env:
  JAVA_VERSION: "17"
  ALLURE_VERSION: "2.25.0"

jobs:
  smoke:
    name: "🔥 Smoke"
    runs-on: ubuntu-latest
    continue-on-error: true
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Smoke'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Smoke
        continue-on-error: true
        run: ./gradlew test -Dsuite=Smoke
        env:
          BOOKS_API_URL: ${{ secrets.BOOKS_API_URL }}
          RICK_API_URL: ${{ secrets.RICK_API_URL }}
          JSONPLACEHOLDER_API_URL: ${{ secrets.JSONPLACEHOLDER_API_URL }}
          SOAP_API_URL: ${{ secrets.SOAP_API_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-smoke
          path: build/allure-results

  regression:
    name: "🔁 Regression"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Regression')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Regression
        continue-on-error: true
        run: ./gradlew test -Dsuite=Regression
        env:
          BOOKS_API_URL: ${{ secrets.BOOKS_API_URL }}
          RICK_API_URL: ${{ secrets.RICK_API_URL }}
          JSONPLACEHOLDER_API_URL: ${{ secrets.JSONPLACEHOLDER_API_URL }}
          SOAP_API_URL: ${{ secrets.SOAP_API_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-regression
          path: build/allure-results

  contract:
    name: "📋 Contract"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Contract')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Contract
        continue-on-error: true
        run: ./gradlew test -Dsuite=Contract
        env:
          BOOKS_API_URL: ${{ secrets.BOOKS_API_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-contract
          path: build/allure-results

  security:
    name: "🔒 Security"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Security')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Security
        continue-on-error: true
        run: ./gradlew test -Dsuite=Security
        env:
          BOOKS_API_URL: ${{ secrets.BOOKS_API_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-security
          path: build/allure-results

  negative:
    name: "❌ Negative"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Negative')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Negative
        continue-on-error: true
        run: ./gradlew test -Dsuite=Negative
        env:
          BOOKS_API_URL: ${{ secrets.BOOKS_API_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-negative
          path: build/allure-results

  soap:
    name: "🧼 SOAP"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'SOAP')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
