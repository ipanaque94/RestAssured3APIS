      - run: chmod +x gradlew
      - name: Ejecutar SOAP
        continue-on-error: true
        run: ./gradlew test -Dsuite=SOAP
        env:
          SOAP_API_URL: ${{ secrets.SOAP_API_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-soap
          path: build/allure-results

  idempotencia:
    name: "🔄 Idempotencia"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: regression
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Idempotencia')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Idempotencia
        continue-on-error: true
        run: ./gradlew test -Dsuite=Idempotencia
        env:
          BOOKS_API_URL: ${{ secrets.BOOKS_API_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-idempotencia
          path: build/allure-results

  performance:
    name: "⚡ Performance"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: regression
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Performance')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Performance
        continue-on-error: true
        run: ./gradlew test -Dsuite=Performance
        env:
          BOOKS_API_URL: ${{ secrets.BOOKS_API_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-performance
          path: build/allure-results

  consolidado:
    name: "📊 Reporte Consolidado"
    runs-on: ubuntu-latest
    needs:
      [
        smoke,
        regression,
        contract,
        security,
        negative,
        soap,
        idempotencia,
        performance,
      ]
    if: always()
    steps:
      - name: Descargar todos los resultados
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: build/allure-results

      - name: Generar reporte Allure consolidado
        run: |
          wget -q "https://github.com/allure-framework/allure2/releases/download/${{ env.ALLURE_VERSION }}/allure-${{ env.ALLURE_VERSION }}.tgz"
          tar -xzf "allure-${{ env.ALLURE_VERSION }}.tgz"
          "./allure-${{ env.ALLURE_VERSION }}/bin/allure" generate build/allure-results -o build/allure-consolidado --clean

      - name: Publicar reporte en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/allure-consolidado
          publish_branch: gh-pages

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: REPORTE-CONSOLIDADO
          path: build/allure-consolidado
