name: API Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Test conectividad
        run: |
          echo "=== Probando conectividad ==="
          curl -s -o /dev/null -w "simple-books: %{http_code}\n" https://simple-books-api.click/books || echo "FALLO"
          curl -s -o /dev/null -w "rickandmorty: %{http_code}\n" https://rickandmortyapi.com/api/character/1 || echo "FALLO"
          curl -s -o /dev/null -w "jsonplaceholder: %{http_code}\n" https://jsonplaceholder.typicode.com/posts/1 || echo "FALLO"
          echo "=== Variables proxy ==="
          env | grep -i proxy || echo "Sin proxy"

      - name: Ejecutar tests
        run: |
          ./gradlew test \
            -Djava.net.useSystemProxies=false \
            -DsocksProxyHost="" \
            -DsocksProxyPort="" \
            -Dhttp.proxyHost="" \
            -Dhttps.proxyHost="" \
            -Dhttp.nonProxyHosts="*"

      - name: Generar reporte Allure
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz
          tar -xzf allure-2.25.0.tgz
          ./allure-2.25.0/bin/allure generate build/allure-results -o build/allure-report --clean

      - name: Publicar reporte Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/allure-report

      - name: Publicar reporte Gradle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
