name: API Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite a ejecutar"
        required: false
        default: "All"
        type: choice
        options:
          - All
          - Smoke
          - Regression
          - Contract
          - Security
          - Negative
          - Idempotencia
          - Performance
          - SOAP
permissions:
  contents: read
  actions: write
  checks: write

env:
  JAVA_VERSION: "17"
  ALLURE_VERSION: "2.25.0"

jobs:
  smoke:
    name: "🔥 Smoke"
    runs-on: ubuntu-latest
    continue-on-error: true
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Smoke'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Smoke
        continue-on-error: true
        run: ./gradlew test -Dsuite=Smoke --continue
        env:
          BOOKS_API_URL: ${{ secrets.BOOKS_API_URL }}
          RICK_API_URL: ${{ secrets.RICK_API_URL }}
          JSONPLACEHOLDER_API_URL: ${{ secrets.JSONPLACEHOLDER_API_URL }}
          SOAP_API_URL: ${{ secrets.SOAP_API_URL }}
      - name: Generar Allure
        if: always()
        run: |
          wget -q "https://github.com/allure-framework/allure2/releases/download/${{ env.ALLURE_VERSION }}/allure-${{ env.ALLURE_VERSION }}.tgz"
          tar -xzf "allure-${{ env.ALLURE_VERSION }}.tgz"
          "./allure-${{ env.ALLURE_VERSION }}/bin/allure" generate build/allure-results -o build/allure-report --clean
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-smoke
          path: build/allure-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-smoke
          path: build/reports/tests/test/

  regression:
    name: "🔁 Regression"
