name: API Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite a ejecutar"
        required: false
        default: "All"
        type: choice
        options:
          - All
          - Smoke
          - Regression
          - Contract
          - Security
          - Negative
          - Idempotencia
          - Performance
          - SOAP

permissions:
  contents: write
  pages: write
  id-token: write

env:
  JAVA_VERSION: "17"
  ALLURE_VERSION: "2.25.0"

jobs:
  smoke:
    name: "🔥 Smoke"
    runs-on: ubuntu-latest
    continue-on-error: true
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Smoke'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Smoke
        continue-on-error: true
        run: ./gradlew test -Dsuite=Smoke --continue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-smoke
          path: build/allure-results
          retention-days: 1

  regression:
    name: "🔁 Regression"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Regression')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Regression
        continue-on-error: true
        run: ./gradlew test -Dsuite=Regression --continue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-regression
          path: build/allure-results
          retention-days: 1

  contract:
    name: "📋 Contract"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Contract')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Contract
        continue-on-error: true
        run: ./gradlew test -Dsuite=Contract --continue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-contract
          path: build/allure-results
          retention-days: 1

  security:
    name: "🔒 Security"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Security')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Security
        continue-on-error: true
        run: ./gradlew test -Dsuite=Security --continue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-security
          path: build/allure-results
          retention-days: 1

  negative:
    name: "❌ Negative"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Negative')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Negative
        continue-on-error: true
        run: ./gradlew test -Dsuite=Negative --continue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-negative
          path: build/allure-results
          retention-days: 1

  soap:
    name: "🧼 SOAP"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'SOAP')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar SOAP
        continue-on-error: true
        run: ./gradlew test -Dsuite=SOAP --continue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-soap
          path: build/allure-results
          retention-days: 1

  idempotencia:
    name: "🔄 Idempotencia"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: regression
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Idempotencia')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Idempotencia
        continue-on-error: true
        run: ./gradlew test -Dsuite=Idempotencia --continue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-idempotencia
          path: build/allure-results
          retention-days: 1

  performance:
    name: "⚡ Performance"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: regression
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.suite == 'All' || inputs.suite == 'Performance')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew
      - name: Ejecutar Performance
        continue-on-error: true
        run: ./gradlew test -Dsuite=Performance --continue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-performance
          path: build/allure-results
          retention-days: 1

  publish-report:
    name: "📊 Publicar Reporte Consolidado"
    runs-on: ubuntu-latest
    needs:
      [
        smoke,
        regression,
        contract,
        security,
        negative,
        soap,
        idempotencia,
        performance,
      ]
    if: always()
    steps:
      - name: Descargar todos los resultados
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: Generar reporte Allure consolidado
        run: |
          wget -q "https://github.com/allure-framework/allure2/releases/download/${{ env.ALLURE_VERSION }}/allure-${{ env.ALLURE_VERSION }}.tgz"
          tar -xzf "allure-${{ env.ALLURE_VERSION }}.tgz"
          "./allure-${{ env.ALLURE_VERSION }}/bin/allure" generate allure-results -o allure-report --clean

          # Crear index.html con metadata
          echo '<html><head><meta http-equiv="refresh" content="0;url=./index.html"></head></html>' > allure-report/redirect.html

      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          force_orphan: true

      - name: Comentar URL del reporte
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📊 **Reporte Allure publicado:** https://ipanaque94.github.io/RestAssured3APIS/'
            })

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: REPORTE-FINAL-CONSOLIDADO
          path: allure-report
          retention-days: 30
