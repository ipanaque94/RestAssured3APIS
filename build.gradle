plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

def allureVersion = "2.25.0"
// Define the version of AspectJ
def aspectJVersion = "1.9.20.1"
// Define configuration for AspectJ agent
configurations {
    agent {
        canBeResolved = true
        canBeConsumed = true
    }
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    testImplementation 'io.rest-assured:rest-assured:5.4.0'
    testImplementation 'io.rest-assured:json-path:5.4.0'
    testImplementation 'io.rest-assured:xml-path:5.4.0'
    testImplementation 'io.rest-assured:json-schema-validator:5.4.0'
    testImplementation 'org.testng:testng:7.10.2'
    
    agent "org.aspectj:aspectjweaver:$aspectJVersion"
    testImplementation "io.qameta.allure:allure-testng:$allureVersion"
    testImplementation "io.qameta.allure:allure-rest-assured:$allureVersion"

}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}
sourceSets {
    test {
        resources {
            srcDirs = ["src/test/resources"]
        }
    }
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.App'
}

tasks.named('test') {
    // Use TestNG for unit tests.
    useTestNG() {
        // Especifica la ruta al archivo XML de TestNG.
        suites 'src/test/resources/TestNG.xml'
        jvmArgs = [ "-javaagent:${configurations.agent.singleFile}" ]
    }
    testLogging {
        events "passed", "skipped", "failed"
        showExceptions = true
        showCauses = true
        showStackTraces = true
        exceptionFormat = "full"
    }
    systemProperty "allure.results.directory", 
                   "$buildDir/allure-results"
}
